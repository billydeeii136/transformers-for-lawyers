name: Harvey Legal Automation

on:
  workflow_dispatch:
  schedule:
    - cron: "17 */6 * * *"

jobs:
  run-harvey-automation:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Python dependencies
        run: python -m pip install --upgrade pip requests

      - name: Write secure env files
        run: |
          mkdir -p .harvey
          cat > .harvey/PACER.env <<'EOF'
          PACER_USERNAME=${{ secrets.PACER_USERNAME }}
          PACER_PASSWORD=${{ secrets.PACER_PASSWORD }}
          PACER_CLIENT_CODE=${{ secrets.PACER_CLIENT_CODE }}
          PACER_LOGIN_URL=https://pacer.login.uscourts.gov/csologin/login.jsf
          PACER_MFA_MODE=manual
          EOF
          cat > .harvey/LEGAL_RESEARCH.env <<'EOF'
          WESTLAW_API_URL=${{ secrets.WESTLAW_API_URL }}
          WESTLAW_API_KEY=${{ secrets.WESTLAW_API_KEY }}
          LEXIS_API_URL=${{ secrets.LEXIS_API_URL }}
          LEXIS_API_KEY=${{ secrets.LEXIS_API_KEY }}
          EOF

      - name: Run Harvey automation
        env:
          START_MCP_SERVER: "0"
        run: bash .harvey/full_automation.sh harvey-elite-2026
