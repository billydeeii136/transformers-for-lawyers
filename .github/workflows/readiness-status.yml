name: Readiness Status
on:
  workflow_dispatch:
  push:
    branches:
      - '**'
  pull_request:
jobs:
  readiness:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Repo metadata
        run: |
          printf 'repository=%s\n' "$GITHUB_REPOSITORY"
          printf 'ref=%s\n' "$GITHUB_REF"
      - name: Baseline checks
        run: |
          test -f README.md || printf 'README.md missing\n'
